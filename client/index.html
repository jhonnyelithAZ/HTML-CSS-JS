<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .bg-purple {
      background-color: #a855f7 !important;
    }

    .bg-pink {
      background-color: #ec4899 !important;
    }

    .bg-brown {
      background-color: #92400e !important;
    }

    .bg-indigo {
      background-color: #6366f1 !important;
    }
  </style>
</head>

<body class="bg-light">
  <div class="container py-4">
    <h1 class="text-center mb-4">Pokédex</h1>

    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <input type="text" id="busqueda" class="form-control" placeholder="Escribe un pokemon">
          <button id="buscar" class="btn btn-warning">Buscar</button>
        </div>
      </div>
    </div>

    <div id="productos" class="row g-4 justify-content-center"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="src/js/main.js"></script>
</body>

</html>
